name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '27 4 * * 3'

permissions:
  contents: read

jobs:
  analyze:
    # Centralized in cuioss-organization, matching every other security/CI workflow in this repo.
    # build-mode: none avoids building the external-artifact benchmark module during CodeQL scanning.
    # The reusable workflow fixes the query suite to +security-and-quality org-wide.
    uses: cuioss/cuioss-organization/.github/workflows/reusable-codeql.yml@05fe424dc32f31daa2fc369fb52ca360d84a62f4 # v0.11.1
    permissions:
      security-events: write
      contents: read
      actions: read
    with:
      languages: '["java"]'
      build-mode: none
