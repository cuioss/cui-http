name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '27 4 * * 3'

permissions:
  contents: read

jobs:
  analyze:
    # Centralized in cuioss-organization, matching every other security/CI workflow in this repo.
    # build-mode: none avoids building the external-artifact benchmark module during CodeQL scanning.
    # The reusable workflow fixes the query suite to +security-and-quality org-wide.
    uses: cuioss/cuioss-organization/.github/workflows/reusable-codeql.yml@dd1b90a37f4c92f785eb935e57af9d3eba5da85c # v0.10.2
    permissions:
      security-events: write
      contents: read
      actions: read
    with:
      languages: '["java"]'
      build-mode: none
